# config/b4i.yaml

protocol: b4i

biomass:

  format: long

  years:
    - 2024
    - 2025

  affiliation_source_column: "Image Name (from PlantMap3D app)"

  columns_to_keep:
    - "Image Name (from PlantMap3D app)"
    - "Sample Date"
    - "timing"
    - "Plot ID"
    - "species"
    - "dry_weight_g"
    - "affiliation"

  rename_map:
    Timing: timing
    Species: species
    Dry Wt (g): dry_weight_g

  affiliation_map:
    AL-Wolfe: AL01
    NY-Jannink: NY02
    AL-Oyebode: AL02
    IA-Corteva: IA01
    IL-Arbelaez: IL02
    ND-Berti: ND02
    FL-Rios: FL01

  drop_zero_weight: false

image:

  filters:

    user_type: B4I

plot_id:

  biomass:

    type: existing

    column: "Plot ID"


  image:

    type: existing

    column: plot_id