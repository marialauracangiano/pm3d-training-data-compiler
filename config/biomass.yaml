# config/biomass.yaml

format: "wide"

years:
  - 2024
  - 2025

affiliation_source_column: "Image Name (from PlantMap3D app)"

species_column: "Species"
weight_column: "Dry Wt (g)"

affiliation_map:
  AL-Wolfe: AL01
  NY-Jannink: NY02
  AL-Oyebode: AL02
  IA-Corteva: IA01
  IL-Arbelaez: IL02
  ND-Berti: ND02
  FL-Rios: FL01

rename_map:
  Timing: timing
  Species: species
  Dry Wt (g): dry_weight_g

plot_id:
  type: "existing"
  column: "Plot ID"

drop_zero_weight: false

wide_format:

  base_columns:
    - "Image Name (from PlantMap3D app)"
    - "Sample Date"
    - "Timing (1, 2, 3)"
    - "Mix name"
    - "Quadrat # (1 to 5)"

  groups:

    - name: cereal
      species_column: "Cereal Species"
      weight_column: "Cereal Dry Wt (g)"

    - name: legume
      species_column: "Legume Species"
      weight_column: "Legume Dry Wt (g)"

    - name: brassica
      species_column: "Brassica Species"
      weight_column: "Brassica Dry Wt (g)"

    - name: other
      species_column: null
      weight_column: "Other Dry Wt (g)"